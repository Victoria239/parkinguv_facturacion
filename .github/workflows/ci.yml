name: CI ParkingUV

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  unit-bdd-security:
    name: Unit tests, BDD and security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          PYTHONPATH=src pytest

      - name: Run BDD tests
        run: |
          PYTHONPATH=src behave

      - name: Run basic security scan
        run: |
          bandit -r src

  performance:
    name: Performance tests with Locust
    runs-on: ubuntu-latest
    needs: unit-bdd-security
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start API
        run: |
          PYTHONPATH=src uvicorn parkinguv.api:app --host 127.0.0.1 --port 8000 &
          sleep 5

      - name: Run Locust performance test
        run: |
          locust --headless -u 20 -r 5 -t 30s --host=http://127.0.0.1:8000 --exit-code-on-error 1
